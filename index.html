        }

            margin-bottom: 30px;
        }
        
        .nav-btn {
            background: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #667eea;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

            background: #667eea;
            color: white;
            transform: translateY(-2px);

        }
        
        .nav-btn.active {
            background: #764ba2;
            color: white;
        }

            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: none;
        }
        
        .ticket.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .ticket-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            margin: -30px -30px 20px -30px;
            border-radius: 10px 10px 0 0;
        }
        
        .ticket-header h2 {
            font-size: 1.8em;
        }
        
        .question {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }
        
        .question h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        
        .question p {
            margin-bottom: 10px;
        }
        
        .answer {
            padding-left: 20px;
            margin-top: 10px;
        }
        
        .answer ul, .answer ol {
            margin-left: 20px;
        }
        
        .answer li {
            margin-bottom: 8px;
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            background: #764ba2;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);

            background: #667eea;

        // Combine all tickets

        function renderTickets() {
            const navGrid = document.getElementById('navGrid');
            const container = document.getElementById('ticketsContainer');
            
            allTickets.forEach((ticket) => {
                // Create navigation button
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = `Билет ${ticket.id}`;
                btn.onclick = () => showTicket(ticket.id);
                navGrid.appendChild(btn);
                
                // Create ticket content
                const ticketDiv = document.createElement('div');
                ticketDiv.className = 'ticket';
                ticketDiv.id = `ticket-${ticket.id}`;
                
                let html = `
                    <div class="ticket-header">
                        <h2>📋 Билет №${ticket.id}</h2>
                    </div>
                `;
                
                ticket.questions.forEach((q, i) => {
                    html += `
                        <div class="question" data-search="${q.q} ${q.a}">
                            <h3>${i + 1}. ${q.q}</h3>
                            <div class="answer">
                                ${q.a}
                            </div>
                        </div>
                    `;
                });
                
                ticketDiv.innerHTML = html;
                container.appendChild(ticketDiv);
            });
        }
        
        function showTicket(id) {
            document.querySelectorAll('.ticket').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`ticket-${id}`).classList.add('active');
            document.querySelectorAll('.nav-btn')[id-1].classList.add('active');
            
            // Scroll to ticket
            document.getElementById(`ticket-${id}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function showAllTickets() {
            document.querySelectorAll('.ticket').forEach(t => t.classList.add('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function searchQuestions() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (searchTerm.length === 0) {
                document.querySelectorAll('.question').forEach(q => q.style.display = 'block');
                return;
            }
            
            document.querySelectorAll('.question').forEach(q => {
                const content = q.getAttribute('data-search').toLowerCase();
                if (content.includes(searchTerm)) {
                    q.style.display = 'block';
                    q.closest('.ticket').classList.add('active');
                } else {
                    q.style.display = 'none';
                }
            });
        }
        
        // Initialize
        renderTickets();
        showTicket(1);
    </script>
